<!DOCTYPE html>
<html>
<head>
    <title>Login - Student Assistant AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-gradient-to-br from-indigo-900 via-purple-900 to-gray-900 text-white h-screen flex items-center justify-center">

<div class="w-full max-w-md">
    <div class="bg-black bg-opacity-40 backdrop-blur-lg rounded-xl p-8 border border-gray-700">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold mb-2">🎓 Student Assistant AI</h1>
            <p class="text-gray-400">Login to access your dashboard</p>
        </div>

        <form id="loginForm">
            <!-- Email Input -->
            <div class="mb-4">
                <label class="block text-sm font-medium mb-2">Email Address</label>
                <input 
                    type="email" 
                    id="email"
                    name="email"
                    required
                    placeholder="admin@university.com"
                    class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-indigo-500"
                >
            </div>

            <!-- Password Input -->
            <div class="mb-6">
                <label class="block text-sm font-medium mb-2">Password</label>
                <input 
                    type="password" 
                    id="password"
                    name="password"
                    required
                    placeholder="••••••••"
                    class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-indigo-500"
                >
            </div>

            <!-- Remember Me -->
            <div class="mb-6 flex items-center">
                <input 
                    type="checkbox" 
                    id="remember"
                    name="remember"
                    class="w-4 h-4 rounded"
                >
                <label for="remember" class="ml-2 text-sm text-gray-300">Remember me</label>
            </div>

            <!-- Error Message -->
            <div id="errorMessage" class="hidden mb-4 p-3 bg-red-500 bg-opacity-20 border border-red-500 rounded text-red-200 text-sm"></div>

            <!-- Login Button -->
            <button 
                type="submit"
                class="w-full bg-indigo-600 hover:bg-indigo-700 px-4 py-2 rounded-lg font-semibold transition duration-200"
            >
                Login
            </button>
        </form>

        <!-- Demo Accounts Info -->
        <div class="mt-6 p-4 bg-gray-800 bg-opacity-50 rounded-lg text-sm text-gray-300">
            <p class="font-semibold mb-2">📝 Demo Accounts:</p>
            <p><strong>Admin:</strong> admin@university.com / admin123</p>
            <p class="mt-2"><strong>Default Password:</strong> 6+ chars, 1 uppercase, 1 digit</p>
        </div>

        <!-- Back Link -->
        <div class="text-center mt-6">
            <a href="/" class="text-indigo-400 hover:text-indigo-300">← Back to Chatbot</a>
        </div>
    </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const remember = document.getElementById('remember').checked;
    const errorDiv = document.getElementById('errorMessage');
    
    try {
        const response = await fetch('/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password, remember })
        });
        
        const data = await response.json();
        
        if (data.success) {
            // Redirect to dashboard
            window.location.href = data.redirect;
        } else {
            errorDiv.textContent = data.message;
            errorDiv.classList.remove('hidden');
        }
    } catch (error) {
        errorDiv.textContent = 'Connection error. Please try again.';
        errorDiv.classList.remove('hidden');
    }
});
</script>

</body>
</html>
