<!DOCTYPE html>
<html>
<head>
    <title>Student Assistant AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-gradient-to-br from-indigo-900 via-purple-900 to-gray-900 text-white h-screen flex">

<!-- Sidebar -->
<div id="sidebar" class="w-64 bg-black bg-opacity-40 backdrop-blur-lg p-4 transition-all duration-300">
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-xl font-bold">Chats</h2>
    </div>
    <button onclick="newChat()" class="w-full bg-indigo-600 hover:bg-indigo-700 p-2 rounded-lg mb-4">
        + New Chat
    </button>
    <div id="history" class="space-y-2 text-sm text-gray-300">
        <div class="p-2 hover:bg-gray-700 rounded cursor-pointer">Previous Chat 1</div>
    </div>
</div>

<!-- Main Chat Area -->
<div class="flex-1 flex flex-col">

    <!-- Top Bar -->
    <div class="flex justify-between items-center p-4 border-b border-gray-700 bg-black bg-opacity-30 backdrop-blur-md">

        <div class="flex items-center space-x-3">
            <button onclick="toggleSidebar()" 
                    class="text-gray-300 hover:text-white text-xl">
                ☰
            </button>
            <h1 class="text-lg font-semibold">🎓 Student Assistant AI</h1>
        </div>

        <div class="flex items-center space-x-3">
            <button id="userButton" onclick="toggleUserMenu()" class="bg-indigo-600 hover:bg-indigo-700 px-3 py-1 rounded text-sm">
                👤 Guest
            </button>
            <div id="userMenu" class="hidden absolute top-14 right-4 bg-gray-800 rounded-lg shadow-lg z-50 min-w-48">
                <a href="/login" class="block px-4 py-2 hover:bg-gray-700 rounded-t-lg">Login</a>
                <button id="logoutBtn" class="hidden w-full text-left px-4 py-2 hover:bg-gray-700">Logout</button>
                <button id="profileBtn" class="hidden w-full text-left px-4 py-2 hover:bg-gray-700">Profile</button>
                <a href="/admin/dashboard" id="adminLink" class="hidden block px-4 py-2 hover:bg-gray-700">Admin Dashboard</a>
                <a href="/teacher/dashboard" id="teacherLink" class="hidden block px-4 py-2 hover:bg-gray-700 rounded-b-lg">Teacher Dashboard</a>
            </div>
        </div>

    </div>

    <!-- Chat Messages -->
    <div id="chat-box" class="flex-1 overflow-y-auto p-6 space-y-4">
        <div class="bg-gray-700 bg-opacity-30 p-4 rounded-lg">
            <p class="text-gray-300">Welcome to Student Assistant AI! 🎓</p>
            <p class="text-gray-400 text-sm mt-2">Ask me about:</p>
            <ul class="text-gray-400 text-sm mt-2 ml-4 list-disc">
                <li>📚 Exam Routine & Schedules</li>
                <li>📅 Class Routine & Timetables</li>
                <li>✏️ Class Tests (CT) & Topics</li>
                <li>📝 Assignment Deadlines</li>
                <li>💡 General Academic Help</li>
            </ul>
        </div>
    </div>

    <!-- Input Area -->
    <div class="p-4 border-t border-gray-700 bg-black bg-opacity-30 backdrop-blur-md">
        <div class="flex items-center bg-gray-800 rounded-full px-4 py-2">
            <input type="file" id="fileInput" class="hidden">
            <button onclick="document.getElementById('fileInput').click()" class="mr-2 text-gray-400 hover:text-white">
                📎
            </button>

            <input type="text" id="user-input"
                   placeholder="Message Student Assistant..."
                   class="flex-1 bg-transparent focus:outline-none text-white"
                   onkeypress="if(event.key === 'Enter') sendMessage()">

            <button onclick="sendMessage()"
                    class="ml-2 bg-indigo-600 hover:bg-indigo-700 px-4 py-1 rounded-full">
                ➤
            </button>
        </div>
    </div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
